          - generic [ref=f2e33]:
            - heading "Let's imagine this..." [level=2] [ref=f2e35]
            - generic [ref=f2e36]:
              - paragraph [ref=f2e37]: You want to watch a movie at the movie theater, and you realize that also you want to order snacks but you have no time to order at the movie theater because the movie that you want to watch is at 20:00 and you're haven't ordered the ticket yet because you want to order when you arrive at the movie theater. And the best part is the distance between your location and the movie theater took 25 minutes to drive. And when arrive there, you hate to stand in line because you just want to watch the movie while eating snacks that you want to buy there and enjoy the movie while you still can. So how can you watch the movie while eating snacks, but the time is still clock?
              - img "wasnack-1.jpg" [ref=f2e40]
          - generic [ref=f2e41]:
            - heading "Problem backgrounds" [level=2] [ref=f2e43]
            - paragraph [ref=f2e45]: From this situation, I conducted a little research to find out what's the biggest problems, and I realized there were a few problems that I found. People hate to stand in line for a long time just to order snacks and tickets. Sometimes people arrive late for the movie and want to order snacks and tickets but don't have time because the movie has already played.
          - generic [ref=f2e46]:
            - heading "Goals" [level=2] [ref=f2e48]
            - paragraph [ref=f2e50]: Letting and giving people ability to order first before they came to a movie theater and skip an order at movie theater, and also saving time.
          - generic [ref=f2e51]:
            - heading "Understanding The Users" [level=2] [ref=f2e53]
            - img "sketch_edited.jpg" [ref=f2e57]
          - generic [ref=f2e58]:
            - heading "Time to do research" [level=2] [ref=f2e60]
            - paragraph [ref=f2e62]: I conducted interviews and user journey maps to understand the users that I was designing for and their needs. A primary user group identified through research was working adults who wanted to buy snacks without standing in line too long and getting late for the movie. These users group confirmed initial assumptions about their own experience with buying snacks at movie theater, but research also revealed that time is not the only factor limiting having time to buy, because of getting late or standing in line too long. Other user problems included Interest or challenges that make it difficult to buy snacks directly at movie theater.
          - generic [ref=f2e63]:
            - heading "Pain points" [level=2] [ref=f2e65]
            - paragraph [ref=f2e67]: There are several pain points that I discovered while I was doing interviews with users. Time — Sometimes getting late to the movie theater, so don't have enough time to order snacks. Accessibility — Platform for ordering snacks are not equipped for diverse backgrounds and for people with disabilities or for older people. IA — When want to order snacks, the menu is the screen behind the workers and the text is to small to read and need to always ask the workers to explain the menu. And flow the pick up the snacks is not pleased because they will shout our name for snacks that we already order.
          - generic [ref=f2e68]:
            - heading "Users in general (Persona)" [level=2] [ref=f2e70]
            - generic [ref=f2e71]:
              - paragraph [ref=f2e72]: I create a persona based on research that we have conducted before. This persona represents all users about pain point that users experience themselves.
              - img "persona.png" [ref=f2e75]
          - generic [ref=f2e76]:
            - heading "So, what is the problem?" [level=2] [ref=f2e78]
            - paragraph [ref=f2e80]: From the persona above, I discovered problem that Christine face it. And I make it into a user story to make it more understand. Christine is a Freelance Graphic Designer who needs to buy snacks, because She want to eat inside the movie theater.
          - generic [ref=f2e81]:
            - heading "Let's see the normal journey" [level=2] [ref=f2e83]
            - generic [ref=f2e84]:
              - paragraph [ref=f2e85]: This is mapping how Christine usually buys snacks and a ticket movie at the movie theater. This method will reveal the normal process of how Christine usually do.
              - img "Group 2608956.png" [ref=f2e88]
          - generic [ref=f2e89]:
            - heading "Start The Design" [level=2] [ref=f2e91]
