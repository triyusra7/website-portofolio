            - generic [ref=f2e117]:
              - paragraph [ref=f2e118]: After I finished all my paper sketching, I took photos all of it and placed them into Figma to make it more digitalized, so I could start designing using Figma based on my sketch before. As the initial design phase continued, I made sure to base screen designs base on research and what user need most and first. Easy pick the movie and snacks from movie theater. User will allow to pick any snacks they want while buy ticket for the movie. One package in one page and one app.
