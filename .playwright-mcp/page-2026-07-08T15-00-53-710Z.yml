          - generic [ref=f2e96]:
            - heading "Initial idea with sketching" [level=2] [ref=f2e98]
            - generic [ref=f2e99]:
              - paragraph [ref=f2e100]: I initiated the problem-solving process by conceptualizing an app. Beginning with hand-drawn sketches and paper wireframes, I appreciated the ease of translating ideas onto paper without concerning myself with the UI. The process of drafting iterations on paper ensured that elements in the digital wireframe effectively addressed user pain points. Notably, I prioritized a shortcut on the home screen for a quick movie theater selection and streamlined the process from selection to choosing snacks for a seamless user experience.
              - generic [ref=f2e101]:
