          - generic [ref=f2e124]:
            - heading "Full version of all sketches in Figma" [level=2] [ref=f2e126]
            - generic [ref=f2e127]:
              - paragraph [ref=f2e128]: These are full pages process, from home until order ticket and snack and pay. Here we can see how the app operates. I use "Low-Fidelity" to describe the process. And then I create a "Prototype" so it will be clickable when we want to test it.
              - img "Screenshot (455).png" [ref=f2e131]
          - generic [ref=f2e132]:
            - heading "Now...It's time to test it!" [level=2] [ref=f2e134]
            - paragraph [ref=f2e136]: After I prepare all of the pages and make them into prototypes so people can click the page, I talk to users that I interviewed before, because they represent my persona. I use the method called "Usability Study (moderated)" to do the testing. This means I do Zoom meetings with them and give them the prototype to do the testing with tasks that I prepared before. After I did a Usability Study with users, I discovered some findings that users feel and experience by themselves through the prototype. And these are the results. Finding 1 — Users want synopsis and time in the home page. Finding 2 — Users want to menu and search bar to find specific snacks. Finding 3 — Users need amount for the items and ability to choose seats. Finding 4 — Not every users want to buy ticket and snacks for themselves. If they can buy snacks for other people and can share the receipt, it would be nice because the other people doesn't have to wait the person who buy to them.
          - generic [ref=f2e137]:
            - heading "Refining The Design" [level=2] [ref=f2e139]
