            - generic [ref=f2e157]:
              - paragraph [ref=f2e158]: Because I want to make the look of the app more engaging and can fit our persona. I use the primary color blue because the definition that makes the color blue is often described as security, calm, order, and peace. It fits the app because the user needs to trust the product so that they can feel safe and relaxed when using it. For the typeface itself, I using "Poppins" which Wasnack will be dedicated to loyal customers for all tickets and food that are sold are always the best but at an affordable price and also always served with smiles and humility from us.
