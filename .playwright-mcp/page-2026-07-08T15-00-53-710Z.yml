            - generic [ref=f2e147]:
              - paragraph [ref=f2e148]: From findings that I get from the Usability Study, I iterate my design process and make it more usable for users. And these are the results. Because users want to find specific snacks, so there is a "search bar" to allow users type and find any specific snacks. There is a "share button" for user can share the receipt to other people.
