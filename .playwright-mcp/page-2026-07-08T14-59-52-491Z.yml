          - generic [ref=f1e33]:
            - heading "Let's imagine this..." [level=2] [ref=f1e35]
            - generic [ref=f1e36]:
              - paragraph [ref=f1e37]: Your business needs raw materials to produce goods to sell to customers, so you need to restock them regularly. Traditionally, you create a purchase order (PO) and send it to your suppliers via email or as a physical copy. You believe there must be a better way to create and track POs when ordering from suppliers.
              - img "mocokup-linkz.jpg" [ref=f1e40]
          - generic [ref=f1e41]:
            - heading "Problem backgrounds" [level=2] [ref=f1e43]
            - paragraph [ref=f1e45]: Our users frequently create and send POs and SOs for their business transactions, often involving large quantities of goods and services. While larger companies have dedicated teams for this, startups often handle these tasks manually. This process is time-consuming and requires understanding complex calculations like taxes. Users also need a way to track their sales, purchases, and overall revenue.
          - generic [ref=f1e46]:
            - heading "Goals" [level=2] [ref=f1e48]
            - paragraph [ref=f1e50]: We aim to simplify the process of creating POs and SOs by automating calculations, such as total amounts and taxes. We also want to provide a multi-user platform with customizable access levels. Lastly, the platform should offer robust tracking capabilities for sales, purchases, and revenue.
          - generic [ref=f1e51]:
            - heading "Project duration and teams" [level=2] [ref=f1e53]
            - paragraph [ref=f1e55]: The total duration for this project to be finished is one month. And for the teams, one UI/UX Designer, four Full-stack Developers, one Lead developer, and one Head of product.
          - generic [ref=f1e56]:
            - heading "Understanding our users" [level=2] [ref=f1e58]
            - img "User interview" [ref=f1e62]
          - generic [ref=f1e63]:
            - heading "Get to know our users" [level=2] [ref=f1e65]
            - paragraph [ref=f1e67]: I conducted user interviews to gather feedback on our product. Despite a limited sample size, the insights gained from these interviews will guide our product development efforts.
          - generic [ref=f1e68]:
            - heading "Pain points" [level=2] [ref=f1e70]
            - paragraph [ref=f1e72]: "These are some pain points that users mention when we do interviews with them: Complexity of features: Users find the system overly complex, especially for tasks like creating purchase orders (POs) and sales orders (SOs). Tax calculations: There are issues with tax calculations, including incorrect application of taxes to POs and difficulties in editing tax information. Document editing: Users face challenges when editing documents, such as being unable to edit customer names or track price changes. Customization: Users want more customization options, such as the ability to set discounts and taxes automatically, and to have more control over the layout and content of documents. User interface: The user interface is considered cluttered and confusing, making it difficult to navigate and complete tasks. Data entry: Users find the data entry process to be time-consuming and inefficient, particularly for large quantities of data. Search functionality: The search function is limited and does not allow for advanced searches based on specific criteria. Inventory management: Users have difficulties managing inventory, especially when dealing with large quantities and multiple suppliers. Order management: Users find the order management process to be cumbersome, with too many steps and limited visibility into order status. Communication: Users prefer to use WhatsApp for communication rather than email and would like more options for customizing communication preferences. System features: Users have requested additional features, such as the ability to create custom reports, track order history, and manage multiple currencies."
          - generic [ref=f1e73]:
            - heading "Ideation and implementation" [level=2] [ref=f1e75]
            - img "Inventory-(after).jpg" [ref=f1e79]
          - generic [ref=f1e80]:
            - heading "Focus on improving" [level=2] [ref=f1e82]
            - paragraph [ref=f1e84]: "Because we just have limited time, so we need to focusing on what the most feature that we can improve first. And then we can plan for the next improvement. This is that we want to focus on for the first stage: Accurate formula implementation: Ensuring that all calculations, including taxes and totals, are accurate and consistent. Granular access control: Implementing a robust access control system that allows owners to onboard employees and assign specific permissions based on their roles and responsibilities. Inventory and catalog management: Enhancing the inventory and catalog management features to provide a more comprehensive and user-friendly experience. Document generation: Improving the generation of invoices, sales orders (SOs), and purchase orders (POs) to ensure clarity and completeness of information. Partner experience: Enhancing the overall partner experience by streamlining the transaction process and providing a more intuitive interface."
          - generic [ref=f1e85]:
            - heading "Improving \"Tax formula\"" [level=2] [ref=f1e87]
            - generic [ref=f1e88]:
              - paragraph [ref=f1e89]: "The tax calculations for Indonesia, Malaysia, and Singapore are currently inaccurate. Indonesian tax calculations, in particular, differ significantly from those in Malaysia and Singapore, requiring a more specific formula. To address this, I have consulted with my colleagues and father, who have a deeper understanding of Indonesian tax regulations. For Malaysian and Singaporean tax calculations, I have incorporated feedback from our stakeholders. The following is the result of our formula development: Indonesia Tax Formula (PPh Gross Up, PPh, PPN Inclusive, PPN Exclusive), Malaysia Tax Formula, and Singapore Tax Formula."
              - generic [ref=f1e90]:
                - img "PPH-Gross-up-tax.jpg" [ref=f1e92]
                - img "Tax-PPH.jpg" [ref=f1e94]
                - img "Malaysia-tax.jpg" [ref=f1e96]
                - img "Tax-PPN-Inclusive.jpg" [ref=f1e98]
                - img "Tax-PPN-Exclusive.jpg" [ref=f1e100]
                - img "GST.jpg" [ref=f1e102]
          - generic [ref=f1e103]:
            - heading "Improving \"Roles and permission\"" [level=2] [ref=f1e105]
            - generic [ref=f1e106]:
              - paragraph [ref=f1e107]: Our users often have employees whom they onboard to handle and delegate tasks. This new feature aims to empower owners by granting them the authority to assign specific roles and permissions to each employee. And this is the concept and design.
              - generic [ref=f1e108]:
                - img "Business user.jpg" [ref=f1e110]
                - img "Employee.jpg" [ref=f1e112]
          - generic [ref=f1e113]:
            - heading "Improving \"Inventory management\"" [level=2] [ref=f1e115]
            - generic [ref=f1e116]:
              - paragraph [ref=f1e117]: "Previously, users had to input all their inventory data into an Excel spreadsheet and then upload it to Linkz. If there were any errors in the inventory, users had to re-upload the entire spreadsheet as they couldn't make direct edits within the platform. This was a significant hurdle for users as it was inconvenient. Users expressed a desire to continue uploading inventory via Excel format but also wanted the ability to input and edit inventory data directly within the platform, eliminating the need for frequent re-uploads. Therefore, I proposed a design that addressed this issue, and it has been approved. In this design, users can still manually upload Excel files or input data directly into the platform. However, we encourage users to input data directly within the platform. Propose design — In the proposed design, I aimed to provide users with a choice upon their initial access to the inventory section in Linkz. They can either choose to upload their inventory via XLS format or input the data manually directly within the platform. Additionally, I've included clear instructions to guide users through the subsequent steps. Final design — For the final version, we maintained the previous design with an improvement: a default table is now included to allow users to input their inventory directly or upload it in XLS format. Additionally, users can directly edit inventory items within the platform if needed."
              - generic [ref=f1e118]:
                - img "Inventory.jpg (propose)" [ref=f1e120]
                - img "Inventory-(after).jpg (final)" [ref=f1e122]
          - generic [ref=f1e123]:
            - heading "Improving \"Catalogue\"" [level=2] [ref=f1e125]
            - generic [ref=f1e126]:
              - paragraph [ref=f1e127]: Previously, the inventory system also functioned as a catalog, meaning that creating an inventory automatically generated a catalog. To offer both public and private catalogs with different pricing, users had to create two separate inventories. To improve this process, we've separated the inventory and catalog functions. Now, a single inventory can be used to create multiple catalogs, eliminating the need for duplicate data entry. This allows sellers to create private catalogs with special pricing for specific partners or create public catalogs with standard pricing for all customers. Previous design — In the old design, the inventory and catalog were combined into a single system. If a user wanted to create a private catalog, they had to re-upload the catalog data. This made the system difficult to use because users wanted to be able to select items from their existing inventory when creating a new catalog. Final design — The new design divides the inventory and catalog functions into two separate modules. Users can now independently manage their inventory by uploading or creating new items. Once an inventory is established, users can effortlessly generate catalogs by selecting items from their inventory. This decoupling not only simplifies the catalog creation process but also enhances data integrity and accuracy, leading to more effective sales tracking and management.
              - generic [ref=f1e128]:
                - img "Catalogue previous.jpg" [ref=f1e130]
                - img "Inventory-final.jpg" [ref=f1e132]
          - generic [ref=f1e133]:
            - heading "Improving \"Order form\"" [level=2] [ref=f1e135]
            - generic [ref=f1e136]:
              - paragraph [ref=f1e137]: The order form is the core feature of our platform, as it is used by Linkz users to create sales orders (SO) and purchase orders (PO). Every order form created incurs a credit charge, which can be purchased by users. Credits serve as the "currency" for using the order form feature. Due to time constraints and the absence of a "Sprint" development cycle during the initial release, improvements to the order form were limited. Consequently, we focused on refining only a few key elements. Previous design — The attached images depict the previous versions of our order forms. These older iterations suffered from several deficiencies, most notably the imprecise calculation engine and the requirement for manual tax input. Users were able to enter tax values as either fixed amounts or percentages, leading to inconsistencies and potential errors. Given the critical nature of tax calculations in financial transactions, these shortcomings necessitated significant improvements in the new system. Final design — In this new improvement, I've added a feature called "Payable Amount" which allows users to pay a down payment and the remaining balance upon receiving the goods. This feature is designed to enable sellers to receive a partial payment upfront, thereby facilitating the completion of transactions. This is particularly useful for large orders, as it helps to mitigate the risk of fraud. Additionally, I've standardized the tax calculation to use percentages, aligning with standard tax practices. The remaining functionalities remain unchanged.
              - generic [ref=f1e138]:
                - img "Previous order form.jpg" [ref=f1e140]
                - img "order-form.jpg" [ref=f1e142]
          - generic [ref=f1e143]:
            - heading "Improving \"PDF SO and PO\"" [level=2] [ref=f1e145]
            - generic [ref=f1e146]:
              - paragraph [ref=f1e147]: When users create an order form, they will receive a PDF for either a Sales Order (SO) or a Purchase Order (PO), depending on the type of order they create. This PDF serves as official documentation that can be shared with their business partners. However, some users have expressed confusion regarding certain details included in the PDF. Previous design — These are examples of previous sales order (SO) or purchase order (PO) invoices. However, it is unclear whether these are SOs or POs due to the lack of specific indicators. Additionally, the names listed do not clearly indicate the issuer or recipient of the order. If users could add additional notes in a "Remarks" field while creating the order form, it would provide more context for their business partners. Unfortunately, this feature is not currently available, leading to confusion among many Linkz users. Final design — This is the newly improved PDF version. The information is now clearer, with explicit indicators of whether it is a Sales Order (SO) or a Purchase Order (PO). The issuer and recipient are also clearly identified in the title. Additionally, information such as "delivery info" and "remarks" that was previously omitted is now included.
              - generic [ref=f1e148]:
                - img "PDF lama.jpg" [ref=f1e150]
                - img "sales.jpg" [ref=f1e152]
                - img "purchase.jpg" [ref=f1e154]
          - generic [ref=f1e155]:
            - heading "Improving \"Employee\"" [level=2] [ref=f1e157]
            - generic [ref=f1e158]:
              - paragraph [ref=f1e159]: This feature allows owners to onboard their employees onto the Linkz platform under the same company account but with individual logins. The purpose is to enable owners to delegate tasks to their employees. Previous design — Previously, this feature exclusively granted owners the authority to onboard their employees onto the Linkz platform. Upon onboarding, employees were assigned roles such as "Business Admin" or "Business User". Even the owner themselves assumed the role of "Business Admin". Furthermore, once onboarded, employees had unrestricted access to the entire platform. This posed a significant security risk as there were no access controls to limit employee activities. Final design — For this improvement, I've added a "Roles and Permissions" feature. In simpler terms, owners can now control which parts of the platform their employees can access and what actions they can perform. Employees can either have edit or view-only permissions. Additionally, only the owner can manage these roles and permissions.
