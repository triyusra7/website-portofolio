            - generic [ref=f1e372]:
              - paragraph [ref=f1e373]: Projects
              - generic [ref=f1e374]:
                - paragraph [ref=f1e375]: "Project 1: Area Tracking"
                - paragraph [ref=f1e376]: The "Area Tracking" project addresses users' need to measure and record the size of their business area, including the type of business and commodities grown. The solution involves a "tracing steps" feature, where users walk or drive around their area to map it directly. This project allows users to get accurate measurements of their business land, which can also be used for traceability purposes when selling products. As a result, users who have not measured their business areas are now able to use this tool to manage their records effectively.
              - generic [ref=f1e377]:
                - paragraph [ref=f1e378]: "Project 2: Marketplace"
                - paragraph [ref=f1e379]: The "Marketplace" project focuses on enhancing the B2B agricultural marketplace experience. Users prefer dealing with trusted partners but also seek new, reliable partners. This project provides each user with their own store to display commodities and a "success" indicator that shows transaction history. Users can save partner stores for quick access and use the marketplace directly or via WhatsApp, allowing transactions without app installation for new partners. The result is a more user-friendly marketplace that allows for flexible and secure transactions, improving user trust and satisfaction.
              - generic [ref=f1e380]:
                - paragraph [ref=f1e381]: "Project 3: Wallet 2 (Business Wallet)"
                - paragraph [ref=f1e382]: The "Wallet 2" project solves users' challenges in managing sales and purchase funds in a single wallet by introducing a dedicated "Business Wallet" for storing sales proceeds. This separation allows users to clearly see their earnings and easily transfer or withdraw their funds. The implementation of this project resulted in increased user satisfaction as they could now manage their business finances more effectively without confusion.
              - generic [ref=f1e383]:
                - paragraph [ref=f1e384]: "Project 4: Financial Report (Cash Flow Record)"
                - paragraph [ref=f1e385]: The "Financial Report" project was redesigned into a "Cash Flow Record" to offer users a clearer overview of their transaction history and financial activities on PasarMIKRO. The updated design uses bar charts for better visualization and allows users to manually input sales and other expenses. This change led to a significant increase in user engagement with the cash flow records, as users found the feature more intuitive and helpful for their financial tracking needs.
