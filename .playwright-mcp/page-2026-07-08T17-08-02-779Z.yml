          - generic [ref=f1e277]:
            - paragraph [ref=f1e278]: Hi, I'm Tri Anugerah Yusra, feel free to call me "Tri." I hold a Bachelor's degree in Economics, specializing in Accounting (2018), and a Professional Certificate in Digital Design (2021).
            - paragraph [ref=f1e279]: Based in South Jakarta, I'm passionate about UI/UX design and deeply committed to crafting user-centered experiences backed by real research. I thrive on understanding people, what they struggle with, what they need, and translating that into design that actually helps.
            - paragraph [ref=f1e280]: My journey started as a Graphic Designer Intern at Sinarmas Land, grew through UI/UX roles at PasarMIKRO and Linkz Asia, and now continues as a freelance designer working on HRIS platforms, logistics features, ERP solutions, and brand identities.
            - paragraph [ref=f1e281]: Looking ahead, I aspire to grow into an Interaction Designer role, working alongside diverse, innovative teams. In my spare time I enjoy badminton and football, art (especially Keith Haring), singing, and staying sharp through reading.
