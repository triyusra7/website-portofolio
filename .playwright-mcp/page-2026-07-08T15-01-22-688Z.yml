            - heading "Doing more research" [level=2] [ref=f3e123]
            - generic [ref=f3e124]:
              - paragraph [ref=f3e125]: After several months and we have a bigger team of developers and products, we want to continue this project and want to do some proper research. So we start with an internal discussion about the problem in our app, and we use the method "How Might We" to discover the problem. And after that, we visit some of our users to do an interview session with them to know what exactly they feel and need.
              - generic [ref=f3e126]:
                - img "HMW_edited.jpg" [ref=f3e128]
                - img "question for buyer.png" [ref=f3e130]
                - img "question for seller.png" [ref=f3e132]
          - generic [ref=f3e133]:
            - heading "Result from the research" [level=2] [ref=f3e135]
            - paragraph [ref=f3e137]: When we finish doing our interviews with our users. We discover some interesting insights from the field. And this is some summary from our users. Know the seller and buyer less than 10-15 years ago, and first time know from word of mouth (from the driver, from the broker, or approach by himself). A track record is important to know whether the seller can be trusted or not. And he will ask his friend or other people who are already doing the transaction with the seller, whether he is good or not. After 2-3 transactions there is no issue with the payment and transaction, He can trust the seller, as long the seller can provide the demand. Farmers (petani) he's the "main people". So if he want to find new farmer, he must offer something valuable to the farmer. So they want to do transactions with him. Exp like fish seed, cultivation knowledge, etc. He can trust someone to do transactions when they pay full cash and have a commitment in the beginning. Like when they do a transaction and agree with the terms and conditions, He can pay as agreed in advance. Cash or transfers is not a problem, as long fully paid in advance. but transfers are more convenient. Some of the farmers do not have an Android phone and just use a phone for calls and send a text (SMS). For the price will be different each day. Farmers don't know the best price for sell their commodity.
          - generic [ref=f3e138]:
            - heading "Our first persona!!!" [level=2] [ref=f3e140]
            - generic [ref=f3e141]:
              - paragraph [ref=f3e142]: Because we are already doing some research and go to the field to collect and gain some more information. We decide to create our first persona. So we can know who we designing for and who our customer segment. So, for our persona will be divided by two personas. First is a persona for "Trader", who just buys commodities. And the other persona for "Farmer", who just sells their commodities through our platform. Most of our traders are middlemen or companies that need commodities to re-stock their warehouses for raw materials to produce their products. And for our farmers, most of them are farmers that they just sell their commodities to traders.
