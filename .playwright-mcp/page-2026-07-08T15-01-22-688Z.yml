            - generic [ref=f3e192]:
              - paragraph [ref=f3e193]: "From our research and visit to the field and meeting our users, we think our goal for our new marketplace concept. We want to focus on three things: 1. DISCOVERY (Matchmaking). 2. TRUST. 3. VALUE/STICKINESS (There's always a reason to come back)."
