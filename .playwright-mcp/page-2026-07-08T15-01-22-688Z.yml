                - img "ideation board 5" [ref=f3e204]
          - generic [ref=f3e205]:
            - heading "Some ideas for our new marketplace" [level=2] [ref=f3e207]
            - paragraph [ref=f3e209]: "Because we knew what we wanted to focus on, my leader allowed me to find solutions for the best way and best ideas to implement in our marketplace. And I already prepared some ideas for this and already discussed with my leader too. And I already have many ideas and already approved them, but because our team does not many and we need to focus on some aspects too, so just few ideas that good to go to be develop. And these are for ideas: 1. Revamp our marketplace. Interface and adjust the flow for transactions, because we notice there is an unhappy path that our users face it like our checkout process. 2. Allow users to take just only commodities they want. To avoid spamming when other users want to give offer to the other user. Because our users have specific commodities they want to buy and they always buy the same commodity. 3. Allow users to have a \"badge\" to identify them as a new users or existing user. This badge to build trust between our users to doing transaction. 4. Allow user to set quantity that they want to buy without being directed to other page. In our previous flow, when user want to buy something from other user \"toko\", they will directed to another page to set quantity, and this is to overwhelming for our users. So we give them new experience that they can set quantity in that same page. 5. Put features \"Search\" and \"commodity category\", so users can find specific commodities or toko they want to searching. In our previous marketplace, our users must searching one by one toko or commodity that they want to buy or sell (give offer) to a specific user. This is really a bad experience for our user, and considering they have aged between 40 can impact their experience and happiness to use our platform. So we put search field and commodity category to let them find specific commodity they want to find. 6. Put feature \"Sukses\" page in toko. Like other platform marketplaces, to trust find trusted toko usually user can search by badge or rating. But because we don't have much user active, we need to find alternative idea. So I come up with an idea that we can put how many transactions they already did. The purpose of this feature is to provide users with a sense of comfort and security when visiting other users' \"stores\" to engage in transactions with the users of those \"stores\". Additionally, users can see for how long they have been transacting within a certain timeframe. If they have recently completed a transaction, the time of the transaction will be displayed, but even if they haven't transacted recently, it will still be visible. Not all information is displayed, as only the quantity of purchases/sales and the quantity sold are shown. 7. Put feature \"banner\" in toko. This feature to let user when they want to show their commodity into their toko like social media but agricultural version. 8. Merge \"Pasar permintaan\" and \"Pasar baru\" into one Pasar. This feature we already have, but merging these two features can simplify our pasar and to avoid misunderstanding. But right now \"pasar permintaan\" already we hide first."
