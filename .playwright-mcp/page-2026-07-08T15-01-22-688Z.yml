          - generic [ref=f3e33]:
            - heading "Let's imagine this..." [level=2] [ref=f3e35]
            - generic [ref=f3e36]:
              - paragraph [ref=f3e37]: You as a Buyer or trader and as a farmer or seller. Let's go with you as a buyer first. You want to buy commodities from a seller, and then you want to search for people who sell commodities that you want to buy. And then let's say you as a seller, and you have a lot of commodities that you want to sell, but you are confused about what to sell to whom?
              - img "mockup-utama.jpg" [ref=f3e40]
          - generic [ref=f3e41]:
            - heading "First our problem backgrounds" [level=2] [ref=f3e43]
            - paragraph [ref=f3e45]: In the early stage, we discover that our customers just want to buy or sell their commodities to every person that can be potential to them. We discover they just want to do transactions and can be recorded by a system that they can see.
          - generic [ref=f3e46]:
            - heading "First Goals" [level=2] [ref=f3e48]
            - paragraph [ref=f3e50]: So that's why we want to create a marketplace for them with many commodities that they can sell or buy in our platform and system.
          - generic [ref=f3e51]:
            - heading "Time Duration and team" [level=2] [ref=f3e53]
            - paragraph [ref=f3e55]: The total duration for this project to be finished is one month (two sprints of development). And for the teams, two UI/UX Designers, two Front-end, two Back-end, one Lead Technology, one CPO, and one QA.
          - generic [ref=f3e56]:
            - heading "Understanding our users" [level=2] [ref=f3e58]
            - img "Understanding our users" [ref=f3e62]
          - generic [ref=f3e63]:
            - heading "First identification our users" [level=2] [ref=f3e65]
            - paragraph [ref=f3e67]: We don't have a persona for the beginning because we create our platform and app based on users' opinions. We gathered all the information and then we created a feature based on that. Mostly they just need to do transaction with new people or with people they already knew.
          - generic [ref=f3e68]:
            - heading "First user-flow" [level=2] [ref=f3e70]
            - generic [ref=f3e71]:
              - paragraph [ref=f3e72]: This user flow I create to map all movement and flow for our "Pasar" based on in our app.
              - img "userflow pasar.png" [ref=f3e75]
          - generic [ref=f3e76]:
            - heading "Doing little research" [level=2] [ref=f3e78]
            - paragraph [ref=f3e80]: Because we have few resources and don't have enough time to do research, so I doing a little research by asking people who can be potential users like those who need eggs or other commodities. I just ask where they buy the commodity, how much they buy it, and what price they buy it because it's all connected. But I also collaborated with stakeholders like my CEO to discuss about implementation in the field.
          - generic [ref=f3e81]:
            - heading "Discover main pain points" [level=2] [ref=f3e83]
            - paragraph [ref=f3e85]: Based on a little research, I found a few pain points that our users (and potential users) face. 1. They want to find a new buyer or seller to expand their network. 2. They want to do transactions with people that they knew before and trust because they do big transactions and if they do with new people, they will need some time to trust them. 3. They want to buy or sell variants of commodities. 4. Sometimes they don't have enough money to buy commodities, but they need to buy to keep their business still running.
          - generic [ref=f3e86]:
            - heading "Early interface" [level=2] [ref=f3e88]
            - img "9.jpg" [ref=f3e92]
          - generic [ref=f3e93]:
            - heading "First implemented design in app" [level=2] [ref=f3e95]
            - generic [ref=f3e96]:
              - paragraph [ref=f3e97]: When I joined this company and team, the app has an interface for the marketplace, which is the look for the app. When users want to buy, they need to choose one Toko's for transactions. After that they can choose the commodity they want to buy or give an offer if they want to sell their commodity to this Toko's owner. Let's take a case they want to buy "direct" which commodity they want to buy in that Toko's. When they press the button "Beli" or Buy, they will directed to another page to fill in the information such as quantity and choose the payment method. And after that to finishing transaction, user have to directed into different page. And then finishing the whole transaction.
              - img "pasar-beli.jpg" [ref=f3e100]
          - generic [ref=f3e101]:
            - heading "Design a new concept into Figma" [level=2] [ref=f3e103]
            - generic [ref=f3e104]:
              - paragraph [ref=f3e105]: As for the result of the design, I already make it in High-Fidelity. The difference between the old app and my design is the flow of purchasing the commodity. When users press the button "Beli" or buy, they will not directed to another page, but still on that page. So they can input the quantity that they want to buy, and below it will appear like a floating button for the summary of their purchase. After the user already filled in the quantity, the user can press the button on the summary and will directed to a different page. This page is the main checkout. So basically when the user wants to change anything, will be directed to this page again, and after everything is good, the user can proceed to PIN section and finish the transaction. And this is the results.
              - img "pasar-pembelian.jpg" [ref=f3e108]
          - generic [ref=f3e109]:
            - heading "Unfortunate..." [level=2] [ref=f3e111]
            - paragraph [ref=f3e113]: Because this project is too big, and we have other priorities that need to be solved quickly. So we have to postpone this project, and our sprint before that is 1 week per sprint. So it's really difficult to finish this project.
          - generic [ref=f3e114]:
            - heading "Start to revamp the feature" [level=2] [ref=f3e116]
